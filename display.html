<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <title>KaraokeQ — Display</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    html, body { overflow: hidden; height: 100%; background: #000; }
  </style>
</head>
<body class="display-page">

  <!-- ═══ IDLE SCREEN ═══ -->
  <div id="screen-idle">
    <div class="idle-logo gradient-text" data-i18n="app.name">KaraokeQ</div>

    <div class="idle-room">
      <div class="idle-room-label" data-i18n="display.roomCode">Room</div>
      <div class="idle-room-code" id="room-code">——</div>
    </div>

    <div class="idle-qr-section">
      <div id="qr-code"></div>
      <p class="idle-qr-label" data-i18n="display.scanToJoin">Scan to add songs</p>
    </div>

    <a class="idle-url" id="remote-url" href="#" target="_blank"></a>

    <p class="idle-waiting" data-i18n="display.waitingForSongs">Waiting for songs…</p>
  </div>

  <!-- ═══ PLAYER SCREEN ═══ -->
  <div id="screen-player" hidden>

    <div id="yt-container" class="sub-player" hidden></div>

    <video id="player-video" class="sub-player" hidden playsinline controls></video>

    <audio id="player-audio" hidden autoplay></audio>

    <div id="audio-bg" class="sub-player" hidden style="
      background:radial-gradient(ellipse at center,#2D1B69 0%,#0D0D1A 70%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
      <div style="font-size:6rem;">🎵</div>
      <div id="audio-title" style="font-size:1.4rem;font-weight:700;text-align:center;padding:0 2rem;"></div>
    </div>

    <iframe
      id="player-iframe"
      class="sub-player"
      hidden
      allow="autoplay; fullscreen; accelerometer; gyroscope"
      allowfullscreen
      sandbox="allow-scripts allow-same-origin allow-presentation allow-popups"
    ></iframe>

    <!-- Single floating control button — shows queue count, auto-hides on inactivity -->
    <button id="fab-ctrl" aria-label="控制菜单" aria-expanded="false">
      <span id="fab-queue-count">0</span>
    </button>

    <!-- Expandable control panel — appears above FAB on click -->
    <div id="ctrl-panel">

      <!-- Header: room code + action buttons -->
      <div class="ctrl-row ctrl-header">
        <div class="overlay-room-badge">
          <span class="room-label" data-i18n="display.roomCode">Room</span>
          <span class="room-val" id="room-code-overlay"></span>
        </div>
        <div style="flex:1"></div>
        <button class="ctrl-btn" id="btn-danmaku" hidden>弹幕 ON</button>
        <button class="ctrl-btn" id="btn-native" hidden>↗ 原网页</button>
        <button class="ctrl-btn" id="btn-qr">QR</button>
        <button class="ctrl-btn" id="btn-queue">
          ≡ <span id="queue-count" class="ctrl-count-badge">0</span>
        </button>
      </div>

      <!-- Now playing -->
      <div class="ctrl-row ctrl-nowplaying" id="ctrl-nowplaying" hidden>
        <p class="ctrl-np-label" data-i18n="display.nowPlaying">Now Playing</p>
        <p id="now-playing-title" class="ctrl-np-title"></p>
        <p id="now-playing-by" class="ctrl-np-by"></p>
      </div>

      <!-- Up next -->
      <div class="ctrl-row ctrl-upnext" id="up-next-section" hidden>
        <p class="ctrl-un-label" data-i18n="display.upNext">Up Next</p>
        <p id="up-next-title" class="ctrl-un-title"></p>
      </div>

    </div>

    <!-- Queue panel -->
    <div id="queue-panel" hidden>
      <div class="queue-panel-header">
        <h3>
          <span data-i18n="display.queue">Queue</span>
          <span class="queue-count-badge" id="queue-count-panel">0</span>
        </h3>
        <button class="btn-icon" onclick="document.getElementById('queue-panel').hidden=true">✕</button>
      </div>
      <ul class="queue-list" id="queue-list"></ul>
    </div>

    <!-- QR panel (in-player) -->
    <div id="qr-panel" hidden>
      <p style="font-size:.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;" data-i18n="display.scanToJoin">Scan to add songs</p>
      <div id="qr-code-player" style="background:#fff;padding:.75rem;border-radius:var(--radius);"></div>
      <p id="qr-url" style="font-size:.78rem;color:var(--text3);word-break:break-all;max-width:280px;text-align:center;"></p>
      <button class="btn btn--ghost btn--sm" onclick="document.getElementById('qr-panel').hidden=true" data-i18n="common.close">Close</button>
    </div>

  </div>

  <div id="mode-indicator"></div>

  <!-- PeerJS + QRCode + App -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/player-page.js"></script>
</body>
</html>
